<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘의 활동 분석기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── SPLASH ── -->
  <div id="view-splash" class="view active">
    <div class="splash-inner">
      <div class="splash-icon">◈</div>
      <h1 class="splash-title">오늘의 활동 분석기</h1>
      <p class="splash-sub">오늘 하루 어떤 사이트를 얼마나 방문했는지,<br/>어떤 주제에 관심을 가졌는지 알려드려요.</p>
      <button id="btn-start" class="btn-main">분석을 시작할까요?</button>
      <p class="splash-note">방문 기록과 체류 시간을 분석합니다</p>
    </div>
  </div>

  <!-- ── LOADING ── -->
  <div id="view-loading" class="view">
    <div class="loading-inner">
      <div class="spinner">
        <div class="spinner-ring"></div>
        <div class="spinner-ring r2"></div>
        <div class="spinner-ring r3"></div>
      </div>
      <p class="loading-text" id="loading-msg">방문 기록 분석 중</p>
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- ── DASHBOARD ── -->
  <div id="view-dashboard" class="view">

    <!-- Header -->
    <div class="dash-header">
      <div>
        <div class="dash-date" id="dash-date"></div>
        <div class="dash-subtitle">오늘의 활동 리포트</div>
      </div>
      <button id="btn-refresh" class="btn-refresh" title="다시 분석">↺</button>
    </div>

    <!-- Stats -->
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-value" id="stat-sites">-</div>
        <div class="stat-label">방문 사이트</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-visits">-</div>
        <div class="stat-label">총 방문 횟수</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-time">-</div>
        <div class="stat-label">측정된 활동</div>
      </div>
    </div>

    <!-- Site Activity -->
    <div class="section">
      <div class="section-title">
        <span class="section-icon">📊</span> 사이트별 활동
      </div>
      <div id="site-list"></div>
    </div>

    <!-- Hourly Heatmap -->
    <div class="section">
      <div class="section-title">
        <span class="section-icon">🕐</span> 시간대별 활동
      </div>
      <div class="heatmap-wrap">
        <div id="heatmap" class="heatmap"></div>
        <div class="heatmap-labels" id="heatmap-labels"></div>
      </div>
    </div>

    <!-- Keywords -->
    <div class="section">
      <div class="section-title">
        <span class="section-icon">🔍</span> 오늘의 주요 관심사
      </div>
      <div id="keywords" class="keyword-cloud"></div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
